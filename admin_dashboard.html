<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Timetable Admin Dashboard</title>
    <style>
        /* -------------------- THEME VARIABLES -------------------- */
        :root {
            --primary: #1e293b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #475569;
            --success: #22c55e;
        }

        /* -------------------- BASE STYLES -------------------- */
        body {
            font-family: "Inter", system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* -------------------- HEADER -------------------- */
        .header {
            background-color: var(--card-bg);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
        }

        #status {
            font-weight: 600;
            color: var(--text-muted);
            margin-right: 20px;
        }

        #generateBtn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #generateBtn:hover {
            background-color: var(--accent-hover);
            transform: scale(1.03);
        }

        /* -------------------- MAIN WRAPPER -------------------- */
        #comparison-container {
            flex: 1;
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(550px, 1fr));
            gap: 30px;
        }

        /* -------------------- CARDS -------------------- */
        .section-card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            padding: 24px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .section-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.05);
        }

        .section-title {
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            border-bottom: 2px solid var(--bg);
            padding-bottom: 8px;
            margin-bottom: 20px;
        }

        /* -------------------- TABLE -------------------- */
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 550px;
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            border: 1px solid var(--border);
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: var(--primary);
            color: white;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        tr:nth-child(even) {
            background-color: #f9fafb;
        }

        .slot-col {
            background-color: #e2e8f0;
            font-weight: 600;
            color: var(--primary);
            width: 90px;
        }

        /* -------------------- CELL CONTENT -------------------- */
        .cell-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .subject {
            font-weight: 700;
            color: var(--accent);
            font-size: 14px;
        }

        .teacher {
            font-size: 12px;
            color: var(--text-muted);
            font-style: italic;
        }

        .room {
            font-size: 11px;
            background: #dcfce7;
            color: #166534;
            padding: 3px 6px;
            border-radius: 4px;
        }

        .empty {
            color: #cbd5e1;
            font-size: 12px;
        }

        /* -------------------- RESPONSIVE -------------------- */
        @media (max-width: 768px) {
            #comparison-container {
                padding: 20px;
                grid-template-columns: 1fr;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 14px;
            }
            #generateBtn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <h1>AI Timetable Generator</h1>
        <div style="display: flex; align-items: center;">
            <span id="status">Ready to generate</span>
            <button id="generateBtn">Generate Clash-Free Plan</button>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="comparison-container" class="comparison-wrapper">
        <!-- Cards loaded dynamically -->
    </div>

    <script src="admin_dashboard.js"></script>
</body>
</html>
